<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인포온 TV 로그인</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      color: #111827;
      background: #f5f5f5;
    }

    body {
      display: flex;
    }

    /* =========================
       가로형 TV UI
       ========================= */
    body.landscape {
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
    }

    body.landscape .container {
      width: 100%;
      max-width: 1280px;
      padding: 32px;
    }

    body.landscape .card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 32px;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      column-gap: 40px;
      align-items: stretch;
    }

    body.landscape .infoArea {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
    }

    body.landscape #formArea {
      min-width: 0;
      padding-top: 2px;
    }

    body.landscape h1 {
      margin: 0 0 8px;
      font-size: 40px;
      font-weight: 700;
    }

    body.landscape .sub {
      margin: 0 0 20px;
      font-size: 18px;
      line-height: 1.4;
      color: #6b7280;
    }

    body.landscape .status {
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f3f4f6;
      font-size: 16px;
      line-height: 1.4;
      color: #374151;
      word-break: break-word;
    }

    body.landscape .field {
      margin-bottom: 14px;
    }

    body.landscape .label {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
      font-weight: 600;
      color: #374151;
    }

    body.landscape .input {
      width: 100%;
      height: 56px;
      padding: 0 16px;
      border: 2px solid #d1d5db;
      border-radius: 12px;
      font-size: 20px;
      outline: none;
      background: #ffffff;
    }

    body.landscape .btn {
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      outline: none;
    }

    body.landscape .error {
      margin: 10px 0 0;
      color: #dc2626;
      font-size: 16px;
      min-height: 22px;
    }

    body.landscape .debug {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    body.landscape .debug-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
      color: #374151;
    }

    body.landscape .log-box {
      max-height: 150px;
      overflow: auto;
      background: #f9fafb;
      border-radius: 10px;
      padding: 10px;
    }

    body.landscape .log-line {
      margin: 0 0 5px;
      font-size: 13px;
      color: #4b5563;
      word-break: break-word;
    }

    /* =========================
       세로형 TV UI
       ========================= */
    body.portrait {
      align-items: flex-start;
      justify-content: center;
      background: #f3f4f6;
      padding-top: 6vh;
    }

    body.portrait .container {
      width: 100%;
      max-width: 900px;
      padding: 40px;
    }

    body.portrait .card {
      background: #ffffff;
      border-radius: 36px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
      padding: 48px;
      min-height: auto;
    }

    body.portrait .infoArea {
      display: block;
    }

    body.portrait h1 {
      margin: 0 0 16px;
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    body.portrait .sub {
      margin: 0 0 36px;
      font-size: 30px;
      line-height: 1.35;
      color: #6b7280;
    }

    body.portrait .status {
      margin-bottom: 34px;
      padding: 22px 26px;
      border-radius: 22px;
      background: #f3f4f6;
      font-size: 28px;
      line-height: 1.35;
      color: #374151;
      word-break: break-word;
    }

    body.portrait .field {
      margin-bottom: 30px;
    }

    body.portrait .label {
      display: block;
      margin-bottom: 14px;
      font-size: 28px;
      font-weight: 700;
      color: #374151;
    }

    body.portrait .input {
      width: 100%;
      height: 96px;
      padding: 0 28px;
      border: 3px solid #d1d5db;
      border-radius: 24px;
      font-size: 34px;
      outline: none;
      background: #ffffff;
    }

    body.portrait .btn {
      width: 100%;
      height: 100px;
      border: none;
      border-radius: 26px;
      font-size: 36px;
      font-weight: 800;
      cursor: pointer;
      outline: none;
    }

    body.portrait .error {
      margin: 20px 0 0;
      color: #dc2626;
      font-size: 26px;
      min-height: 38px;
    }

    body.portrait .debug {
      margin-top: 36px;
      padding-top: 28px;
      border-top: 1px solid #e5e7eb;
    }

    body.portrait .debug-title {
      margin: 0 0 14px;
      font-size: 24px;
      font-weight: 800;
      color: #374151;
    }

    body.portrait .log-box {
      max-height: 280px;
      overflow: auto;
      background: #f9fafb;
      border-radius: 20px;
      padding: 18px;
    }

    body.portrait .log-line {
      margin: 0 0 10px;
      font-size: 20px;
      color: #4b5563;
      word-break: break-word;
    }

    /* =========================
       공통
       ========================= */
    .input:focus,
    .btn:focus {
      border-color: #fb923c;
      box-shadow: 0 0 0 5px rgba(251, 146, 60, 0.25);
    }

    .btn-primary {
      background: #fb923c;
      color: #ffffff;
      margin-top: 8px;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
      margin-top: 14px;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="infoArea">
        <div>
          <h1>로그인</h1>
          <p class="sub">계정에 접속해 서비스를 시작하세요</p>

          <div id="status" class="status">초기화 중...</div>
        </div>

        <div class="debug">
          <p class="debug-title">디버그 로그</p>
          <div id="logBox" class="log-box"></div>
        </div>
      </div>

      <div id="formArea">
        <div class="field">
          <label class="label" for="email">이메일</label>
          <input id="email" class="input" type="email" placeholder="example@domain.com" />
        </div>

        <div class="field">
          <label class="label" for="password">비밀번호</label>
          <input id="password" class="input" type="password" placeholder="비밀번호" />
        </div>

        <button id="loginBtn" class="btn btn-primary">로그인</button>
        <button id="clearBtn" class="btn btn-secondary">저장 정보 초기화</button>

        <p id="error" class="error"></p>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var BASE_URL = 'https://api.onldo.life/api';
      var WEB_BASE_URL = 'https://infoon.vercel.app';

      var KEYS = {
        TOKEN: 'player_token',
        DEVICE_ID: 'player_device_id',
        EMAIL: 'player_email',
        PASSWORD: 'player_password',
        USER: 'player_user',
        ORIENTATION: 'player_orientation'
      };

      var statusEl = document.getElementById('status');
      var errorEl = document.getElementById('error');
      var logBoxEl = document.getElementById('logBox');
      var emailEl = document.getElementById('email');
      var passwordEl = document.getElementById('password');
      var loginBtnEl = document.getElementById('loginBtn');
      var clearBtnEl = document.getElementById('clearBtn');

      function safeGet(key) {
        try {
          return localStorage.getItem(key);
        } catch (e) {
          return null;
        }
      }

      function safeSet(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (e) {}
      }

      function safeRemove(key) {
        try {
          localStorage.removeItem(key);
        } catch (e) {}
      }

      function getQueryParam(name) {
        var query = window.location.search || '';
        var key = name + '=';
        var parts = query.replace('?', '').split('&');

        for (var i = 0; i < parts.length; i++) {
          if (parts[i].indexOf(key) === 0) {
            return decodeURIComponent(parts[i].replace(key, ''));
          }
        }

        return null;
      }

      function getOrientation() {
        var queryOrientation = getQueryParam('orientation');

        if (queryOrientation === 'landscape' || queryOrientation === 'portrait') {
          return queryOrientation;
        }

        return window.innerWidth >= window.innerHeight ? 'landscape' : 'portrait';
      }

      function applyOrientationClass() {
        var orientation = getOrientation();

        document.body.className = '';
        document.body.className = orientation;

        safeSet(KEYS.ORIENTATION, orientation);
        log('[ORIENTATION] ' + orientation + ' / ' + window.innerWidth + 'x' + window.innerHeight);

        return orientation;
      }

      function setStatus(text) {
        statusEl.textContent = text;
        log('[STATUS] ' + text);
      }

      function setError(text) {
        errorEl.textContent = text || '';
        if (text) {
          log('[ERROR] ' + text);
        }
      }

      function log(text) {
        try {
          console.log('[TV LOGIN]', text);
        } catch (e) {}

        if (!logBoxEl) return;

        var p = document.createElement('p');
        p.className = 'log-line';
        p.textContent = text;
        logBoxEl.appendChild(p);
        logBoxEl.scrollTop = logBoxEl.scrollHeight;

        while (logBoxEl.children.length > 80) {
          logBoxEl.removeChild(logBoxEl.children[0]);
        }
      }

      function clearStorage() {
        safeRemove(KEYS.TOKEN);
        safeRemove(KEYS.DEVICE_ID);
        safeRemove(KEYS.EMAIL);
        safeRemove(KEYS.PASSWORD);
        safeRemove(KEYS.USER);
        safeRemove(KEYS.ORIENTATION);
      }

      function isInvalidValue(value) {
        return !value || value === 'undefined' || value === 'null';
      }

      function withTimeout(promise, ms, label) {
        return new Promise(function (resolve, reject) {
          var done = false;

          var timer = setTimeout(function () {
            if (done) return;
            done = true;
            reject(new Error(label + '_TIMEOUT'));
          }, ms);

          promise.then(function (value) {
            if (done) return;
            done = true;
            clearTimeout(timer);
            resolve(value);
          }).catch(function (err) {
            if (done) return;
            done = true;
            clearTimeout(timer);
            reject(err);
          });
        });
      }

      function fetchJson(path, token, options) {
        var finalOptions = options || {};
        var headers = finalOptions.headers || {};

        headers['Content-Type'] = 'application/json';

        if (token) {
          headers['Authorization'] = 'Bearer ' + token;
        }

        return fetch(BASE_URL + path, {
          method: finalOptions.method || 'GET',
          headers: headers,
          body: finalOptions.body
        }).then(function (res) {
          log('HTTP ' + res.status + ' ' + path);

          return res.text().then(function (text) {
            var data = null;

            try {
              data = text ? JSON.parse(text) : null;
            } catch (e) {
              data = text;
            }

            if (!res.ok) {
              log('response error body: ' + String(text));
              throw new Error('HTTP_' + res.status);
            }

            return data;
          });
        });
      }

      function login(email, password) {
        return fetchJson('/digital_board/auth/login', null, {
          method: 'POST',
          body: JSON.stringify({
            email: email,
            password: password
          })
        });
      }

      function registerDevice(token, payload) {
        return fetchJson('/digital_board/devices/register', token, {
          method: 'POST',
          body: JSON.stringify({
            model_id: payload.modelId,
            device_model_name: payload.modelName,
            orientation: payload.orientation,
            user_id: payload.userId,
            organization: payload.organization,
            organization_type: payload.organization_type
          })
        });
      }

      function getDeviceHardwareInfo() {
        try {
          if (
            typeof window !== 'undefined' &&
            window.webapis &&
            window.webapis.productinfo &&
            typeof window.webapis.productinfo.getModelCode === 'function'
          ) {
            var modelCode = window.webapis.productinfo.getModelCode();

            return {
              modelId: modelCode,
              modelName: modelCode
            };
          }
        } catch (e) {
          log('getDeviceHardwareInfo error: ' + String(e));
        }

        return {
          modelId: 'web',
          modelName: navigator.userAgent || 'web_player'
        };
      }

      function getUserValue(user, key) {
        if (!user) return '';

        if (user[key]) return user[key];

        if (user.attributes && user.attributes[key]) {
          return user.attributes[key];
        }

        return '';
      }

      function getDeviceIdFromRegisterResponse(res) {
        if (res && res.data && res.data.data && res.data.data.id) {
          return String(res.data.data.id);
        }

        if (res && res.data && res.data.id) {
          return String(res.data.id);
        }

        if (res && res.data && res.data.device && res.data.device.id) {
          return String(res.data.device.id);
        }

        return '';
      }

      function redirectToPlay(deviceId) {
        var orientation = getOrientation();

        setStatus('재생 화면으로 이동 중...');

        setTimeout(function () {
          window.location.href =
            WEB_BASE_URL +
            '/tv-play.html?deviceId=' +
            encodeURIComponent(deviceId) +
            '&orientation=' +
            encodeURIComponent(orientation);
        }, 300);
      }

      function registerAndRedirect(token, user) {
        var savedDeviceId = safeGet(KEYS.DEVICE_ID);

        if (!isInvalidValue(savedDeviceId)) {
          log('saved deviceId found: ' + savedDeviceId);
          redirectToPlay(savedDeviceId);
          return Promise.resolve();
        }

        var info = getDeviceHardwareInfo();
        var orientation = applyOrientationClass();

        var organization = getUserValue(user, 'organization');
        var organizationType = getUserValue(user, 'organization_type');
        var userId = getUserValue(user, 'id');

        setStatus('기기 등록 중...');

        log('register payload: ' + JSON.stringify({
          modelId: info.modelId,
          modelName: info.modelName,
          orientation: orientation,
          organization: organization,
          organizationType: organizationType,
          userId: userId
        }));

        return withTimeout(
          registerDevice(token, {
            modelId: info.modelId,
            modelName: info.modelName,
            orientation: orientation,
            organization: organization,
            organization_type: organizationType,
            userId: Number(userId)
          }),
          7000,
          'DEVICE_REGISTER'
        ).then(function (res) {
          var deviceId = getDeviceIdFromRegisterResponse(res);

          if (!deviceId) {
            log('register response: ' + JSON.stringify(res));
            throw new Error('DEVICE_ID_NOT_FOUND');
          }

          safeSet(KEYS.DEVICE_ID, deviceId);
          log('device registered: ' + deviceId);
          redirectToPlay(deviceId);
        });
      }

      function getLoginToken(res) {
        if (res && res.data && res.data.token) {
          return res.data.token;
        }

        if (res && res.token) {
          return res.token;
        }

        return '';
      }

      function getLoginUser(res) {
        if (res && res.data && res.data.user) {
          return res.data.user;
        }

        if (res && res.user) {
          return res.user;
        }

        return null;
      }

      function saveAuth(token, email, password, user) {
        safeSet(KEYS.TOKEN, token);
        safeSet(KEYS.EMAIL, email);
        safeSet(KEYS.PASSWORD, password);
        safeSet(KEYS.USER, JSON.stringify(user || {}));
        safeSet(KEYS.ORIENTATION, getOrientation());
      }

      function resetLoginButton() {
        loginBtnEl.disabled = false;
        loginBtnEl.textContent = '로그인';
      }

      function tryAutoLogin() {
        setStatus('자동 로그인 확인 중...');

        var savedEmail = safeGet(KEYS.EMAIL);
        var savedPassword = safeGet(KEYS.PASSWORD);

        log('savedEmail: ' + (savedEmail || '(none)'));
        log('savedPassword exists: ' + (!!savedPassword));

        if (isInvalidValue(savedEmail) || isInvalidValue(savedPassword)) {
          setStatus('로그인 정보를 입력해주세요');
          return Promise.resolve(false);
        }

        setStatus('자동 로그인 시도 중...');

        return withTimeout(
          login(savedEmail, savedPassword),
          7000,
          'AUTO_LOGIN'
        ).then(function (res) {
          var token = getLoginToken(res);
          var user = getLoginUser(res);

          if (!token || !user) {
            clearStorage();
            setStatus('자동 로그인 실패');
            setError('저장된 로그인 정보가 유효하지 않습니다.');
            return false;
          }

          saveAuth(token, savedEmail, savedPassword, user);
          setStatus('자동 로그인 성공');

          return registerAndRedirect(token, user).then(function () {
            return true;
          });
        }).catch(function (err) {
          clearStorage();
          setStatus('자동 로그인 실패');
          setError('자동 로그인에 실패했습니다. 다시 로그인해주세요.');
          log('auto login error: ' + String(err));
          return false;
        });
      }

      function handleLogin() {
        var email = (emailEl.value || '').trim();
        var password = passwordEl.value || '';

        setError('');

        if (!email) {
          setError('이메일을 입력해주세요');
          return;
        }

        if (!password) {
          setError('비밀번호를 입력해주세요');
          return;
        }

        setStatus('로그인 요청 중...');
        loginBtnEl.disabled = true;
        loginBtnEl.textContent = '로그인 중...';

        withTimeout(
          login(email, password),
          7000,
          'MANUAL_LOGIN'
        ).then(function (res) {
          var token = getLoginToken(res);
          var user = getLoginUser(res);

          if (!token || !user) {
            setError('이메일 또는 비밀번호를 확인해주세요');
            resetLoginButton();
            return;
          }

          saveAuth(token, email, password, user);
          setStatus('로그인 성공');

          return registerAndRedirect(token, user).then(function () {
            resetLoginButton();
          });
        }).catch(function (err) {
          setError('로그인 중 오류가 발생했습니다.');
          log('manual login error: ' + String(err));
          resetLoginButton();
        });
      }

      loginBtnEl.addEventListener('click', handleLogin);

      clearBtnEl.addEventListener('click', function () {
        clearStorage();
        setError('저장된 정보를 초기화했습니다.');
        setStatus('로그인 정보를 입력해주세요');
        log('storage cleared manually');
      });

      emailEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
          passwordEl.focus();
        }
      });

      passwordEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.keyCode === 13) {
          handleLogin();
        }
      });

      document.addEventListener('keydown', function (e) {
        if (e.keyCode === 10009) {
          e.preventDefault();
          setError('뒤로가기 버튼은 비활성화되어 있습니다.');
        }
      });

      window.addEventListener('resize', function () {
        applyOrientationClass();
      });

      window.onerror = function (msg, src, line, col) {
        log(
          'window.onerror: ' +
          String(msg) +
          ' / ' +
          String(src) +
          ' / ' +
          line +
          ':' +
          col
        );
      };

      applyOrientationClass();
      setStatus('초기화 완료');

      tryAutoLogin().then(function (done) {
        if (!done) {
          emailEl.focus();
        }
      });
    })();
  </script>
</body>
</html>
